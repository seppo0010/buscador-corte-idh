<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Buscador Corte IDH</title>
  <script>
    // GitHub Pages SPA redirect: encode the path as a query param
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
      (l.hash ? '&hash=' + l.hash.slice(1) : '')
    );
  </script>
</head>
<body></body>
</html>
